<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍀 100억 로또 당첨 추천</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1>🍀 100억 로또 당첨 추천</h1>
      <p class="subtitle">You are destined to be the Winner!</p>
      <p class="subtitle-ko">당신은 반드시 당첨될 것입니다</p>
    </header>

    <div id="initialControls" class="controls">
      <button onclick="triggerJackpotSequence(5)" class="primary-btn">5개 번호 생성 (5 Sets)</button>
      <button onclick="triggerJackpotSequence(10)" class="primary-btn">10개 번호 생성 (10 Sets)</button>
      <a href="https://www.dhlottery.co.kr/" target="_blank" class="link-btn">🏆 당첨결과 확인</a>
    </div>

    <section id="result" class="results-grid"></section>

    <div id="resetControls" class="controls hidden">
      <button id="resetBtn" class="secondary-btn">🔁 다시 뽑기 (Try Again)</button>
      <a href="https://www.dhlottery.co.kr/" target="_blank" class="link-btn">🏆 당첨결과 확인</a>
      <button onclick="showInitialMenu()" class="secondary-btn">🏠 처음으로 (Main Menu)</button>
    </div>

    <section class="prizes-container">
      <h3>💰 최근 한 달 당첨 결과 (한줄 요약)</h3>
      <div class="prize-list">
        <!-- 1215회 -->
        <div class="prize-row">
          <div class="prize-meta">
            <span class="prize-draw">1215회</span>
            <span class="prize-amount">26.4억</span>
          </div>
          <div class="ball-container nano">
            <span class="lotto-ball nano ball-yellow">1</span>
            <span class="lotto-ball nano ball-yellow">5</span>
            <span class="lotto-ball nano ball-blue">12</span>
            <span class="lotto-ball nano ball-blue">18</span>
            <span class="lotto-ball nano ball-red">27</span>
            <span class="lotto-ball nano ball-purple">34</span>
          </div>
        </div>
        <!-- 1214회 -->
        <div class="prize-row">
          <div class="prize-meta">
            <span class="prize-draw">1214회</span>
            <span class="prize-amount">18.1억</span>
          </div>
          <div class="ball-container nano">
            <span class="lotto-ball nano ball-yellow">4</span>
            <span class="lotto-ball nano ball-blue">11</span>
            <span class="lotto-ball nano ball-red">23</span>
            <span class="lotto-ball nano ball-purple">31</span>
            <span class="lotto-ball nano ball-purple">35</span>
            <span class="lotto-ball nano ball-green">42</span>
          </div>
        </div>
        <!-- 1213회 -->
        <div class="prize-row">
          <div class="prize-meta">
            <span class="prize-draw">1213회</span>
            <span class="prize-amount">22.8억</span>
          </div>
          <div class="ball-container nano">
            <span class="lotto-ball nano ball-yellow">8</span>
            <span class="lotto-ball nano ball-blue">14</span>
            <span class="lotto-ball nano ball-red">22</span>
            <span class="lotto-ball nano ball-red">28</span>
            <span class="lotto-ball nano ball-purple">36</span>
            <span class="lotto-ball nano ball-green">44</span>
          </div>
        </div>
        <!-- 1212회 -->
        <div class="prize-row">
          <div class="prize-meta">
            <span class="prize-draw">1212회</span>
            <span class="prize-amount">31.1억</span>
          </div>
          <div class="ball-container nano">
            <span class="lotto-ball nano ball-yellow">2</span>
            <span class="lotto-ball nano ball-yellow">9</span>
            <span class="lotto-ball nano ball-blue">15</span>
            <span class="lotto-ball nano ball-red">26</span>
            <span class="lotto-ball nano ball-purple">33</span>
            <span class="lotto-ball nano ball-green">41</span>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p class="copyright">Designed & Developed by <strong>Kim Do-wan</strong></p>
    </footer>
  </main>

  <script src="main.js"></script>
</body>
</html>
