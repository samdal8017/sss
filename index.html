<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 프리미엄 로또 번호 예측</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1>🎯 로또 예측 생성기</h1>
      <p class="subtitle">AI 기반 가중치 알고리즘으로 분석된 행운의 번호</p>
    </header>

    <div class="controls">
      <button id="generateBtn" class="primary-btn">5개 번호 생성</button>
      <button id="resetBtn" class="secondary-btn">🔁 다시 뽑기</button>
    </div>

    <section id="result" class="results-grid"></section>
  </main>

  <script src="main.js"></script>
</body>
</html>
